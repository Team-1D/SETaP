<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REViiT: Templates</title>
    <link rel="stylesheet" href="template-style.css">
</head>
<body>
    <header>
        <div class="logo">REViiT</div>
        <nav>
            <!-- habeeb's nav bar code -->
        </nav>
    </header>
    
    <main>
        <section class="templates-section">
            <h2>Templates</h2>
            <div class="templates-grid">     
                <div class="template-card" onclick="handleCardClick('Cornell Notes Template')">     <!-- opens blank editable version of new template-->
                    <div class="template-image">
                        <img src="template-images/demo-template-image-1.png" alt="Cornell Notes Template">
                    </div>
                    <p class="template-name">Cornell Notes</p>
                </div>

                <div class="template-card" onclick="">
                    <div class="template-image">
                        <img src="template-images/demo-template-image-2.png" alt="Mapping Template">
                    </div>
                    <p class="template-name">Mapping</p>
                </div>

                <div class="template-card" onclick="">
                    <div class="template-image">
                        <img src="template-images/demo-template-image-3.png" alt="Bullet Journal Template">
                    </div>
                    <p class="template-name">Bullet Journal</p>
                </div>

                <div class="template-card" onclick="">
                    <div class="template-image">
                        <img src="template-images/demo-template-image-4.png" alt="Charting Template">
                    </div>
                    <p class="template-name">Charting</p>
                </div>

                <div class="template-card" onclick="">
                    <div class="template-image">
                        <img src="template-images/demo-template-image-5.png" alt="SQ3R Template">
                    </div>
                    <p class="template-name">SQ3R</p>
                </div>

                <div class="template-card" onclick="">
                    <div class="template-image">
                        <img src="template-images/demo-template-image-6.png" alt="Evergreen Notes Template">
                    </div>
                    <p class="template-name">Evergreen</p>
                </div>

                <div class="template-card" onclick="">
                    <div class="template-image">
                        <img src="template-images/demo-template-image-7.png" alt="Blank">
                    </div>
                    <p class="template-name">Blank</p>
                </div>
            </div>
        </section>

        <section class="templates-section">
            <h2>Other Templates</h2>
            <div class="templates-grid">
                <div class="template-card" onclick="">
                    <div class="template-image">
                        <img src="" alt="Other Template">
                    </div>
                    <p class="template-name">Other Template</p>
                </div>
            </div>
        </section>
    </main>

    <script src=""></script>
</body>
</html>
